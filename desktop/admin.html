<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowRX Manager - لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #8B2F8E; --primary-dark: #6B1F6E; --primary-light: #B35CB6;
  --accent: #FF6B9D; --accent-light: #FFB3D0;
  --gold: #D4A853; --gold-light: #F0D48A;
  --bg: #f0ecf4; --card: #ffffff; --text: #1a1a2e; --text2: #555;
  --border: #e0d8ea; --shadow: 0 4px 20px rgba(107,47,142,0.08);
  --radius: 14px; --radius-sm: 10px;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
  --gradient: linear-gradient(135deg, #8B2F8E, #FF6B9D);
  --sidebar-w: 250px;
}
.dark {
  --bg: #0f0a12; --card: #1a1420; --text: #e8e0f0; --text2: #999;
  --border: #2a2035; --shadow: 0 4px 20px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; min-height:100vh; transition:background .3s,color .3s;
  overflow:hidden; height:100vh;
}

/* ─── Sidebar ─── */
.sidebar{
  width:var(--sidebar-w); background:linear-gradient(180deg,#1a0f24 0%,#2a1538 40%,#3d1f4d 100%);
  color:#fff; display:flex; flex-direction:column; position:fixed;
  height:100vh; z-index:100; border-left:1px solid rgba(255,255,255,0.05);
}
.sidebar-header{
  padding:24px 20px 16px; text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.sidebar-header .logo{
  font-size:22px; font-weight:800;
  background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.sidebar-header .logo-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.sidebar-nav{padding:12px;flex:1;overflow-y:auto}
.sidebar-nav a{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;margin:3px 0;border-radius:var(--radius-sm);
  color:rgba(255,255,255,0.65);text-decoration:none;cursor:pointer;
  transition:all .25s;font-size:14px;font-weight:500;
}
.sidebar-nav a:hover{background:rgba(255,255,255,0.08);color:#fff}
.sidebar-nav a.active{background:rgba(139,47,142,0.4);color:#fff;font-weight:600}
.sidebar-nav a .icon{width:22px;text-align:center;font-size:16px}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.06)}
.sidebar-footer a{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,0.5);text-decoration:none;cursor:pointer;transition:.25s;font-size:13px}
.sidebar-footer a:hover{background:rgba(255,255,255,0.06);color:#fff}
.api-status{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;color:rgba(255,255,255,0.35)}
.api-status .dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
.api-status .dot.offline{background:var(--danger);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── Main ─── */
.main{margin-right:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 28px;background:var(--card);border-bottom:1px solid var(--border);
  min-height:64px;flex-shrink:0;
}
.topbar h1{font-size:18px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:12px}
.topbar-actions button{
  background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text2);transition:.2s;
  font-family:inherit;
}
.topbar-actions button:hover{background:var(--bg);color:var(--text)}
.content{padding:24px 28px;overflow-y:auto;flex:1}

/* ─── Stats ─── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--card);border-radius:var(--radius);padding:22px 20px;
  box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;
  position:relative;overflow:hidden;cursor:default;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(107,47,142,0.12)}
.stat-card .stat-icon{font-size:28px;margin-bottom:6px}
.stat-card .stat-num{font-size:30px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:4px 0}
.stat-card .stat-label{font-size:13px;color:var(--text2)}
.stat-card .stat-bar{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--accent));opacity:.3;
}

/* ─── Card ─── */
.card{
  background:var(--card);border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);margin-bottom:20px;transition:background .3s;
}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{font-size:16px;font-weight:700;color:var(--primary)}

/* ─── Table ─── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:12px 14px;text-align:right;font-weight:600;color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);background:transparent}
td{padding:12px 14px;border-bottom:1px solid var(--border);transition:background .15s}
tr:hover td{background:rgba(139,47,142,0.03)}
tr.clickable{cursor:pointer}

/* ─── Badge ─── */
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge.pending{background:rgba(245,158,11,0.12);color:#d97706}
.badge.confirmed{background:rgba(59,130,246,0.12);color:#2563eb}
.badge.shipped{background:rgba(16,185,129,0.12);color:#059669}
.badge.delivered{background:rgba(16,185,129,0.15);color:#059669}
.badge.cancelled{background:rgba(239,68,68,0.12);color:#dc2626}

/* ─── Buttons ─── */
.btn{
  padding:9px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;font-weight:600;transition:all .25s;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--gradient);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(139,47,142,0.3)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:6px 10px;font-size:14px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:.2s}
.btn-icon:hover{background:var(--bg)}

/* ─── Select ─── */
select.status-select{
  padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;background:var(--card);color:var(--text);font-family:inherit;cursor:pointer;
}

/* ─── Modal ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;
  animation:fadeIn .2s;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--card);border-radius:var(--radius);padding:28px;
  width:90%;max-width:640px;max-height:85vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .25s;
}
.modal h3{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:5px;font-weight:600;font-size:13px;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;background:var(--card);color:var(--text);font-family:inherit;transition:border .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,47,142,0.1)}
.form-group textarea{resize:vertical;height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* ─── Tabs ─── */
.tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tabs button{
  padding:8px 18px;border:1px solid var(--border);border-radius:20px;
  background:transparent;cursor:pointer;font-size:12px;font-weight:500;
  color:var(--text2);transition:all .2s;font-family:inherit;
}
.tabs button:hover{border-color:var(--primary);color:var(--primary)}
.tabs button.active{background:var(--gradient);color:#fff;border-color:transparent}

/* ─── Search ─── */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{
  padding:9px 16px;border:1px solid var(--border);border-radius:20px;
  flex:1;min-width:200px;font-size:13px;background:var(--card);color:var(--text);
  font-family:inherit;transition:border .2s;
}
.search-bar input:focus{outline:none;border-color:var(--primary)}

/* ─── Pagination ─── */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:18px}
.pagination button{
  padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--card);cursor:pointer;font-size:12px;color:var(--text);transition:.2s;
}
.pagination button:hover:not(:disabled){background:var(--bg)}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination span{font-size:13px;color:var(--text2);margin:0 4px}

/* ─── Toast ─── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:14px 22px;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.15);animation:slideIn .3s;display:flex;align-items:center;gap:10px;
  max-width:380px;
}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--info)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

/* ─── Login ─── */
.login-page{
  display:flex;justify-content:center;align-items:center;min-height:100vh;
  background:linear-gradient(135deg,#0f0a12 0%,#1a0f24 40%,#2a1538 70%,#3d1f4d 100%);
  width:100%;margin:0;padding:0;position:relative;overflow:hidden;
}
.login-page::before{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,47,142,.15),transparent);top:-100px;left:-100px;
}
.login-page::after{
  content:'';position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,157,.1),transparent);bottom:-80px;right:-80px;
}
.login-card{
  background:rgba(26,20,32,.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);
  position:relative;z-index:1;
}
.login-card .login-logo{text-align:center;font-size:28px;font-weight:800;margin-bottom:4px}
.login-card .login-logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .login-sub{text-align:center;color:rgba(255,255,255,.4);font-size:13px;margin-bottom:28px}
.login-card .form-group{margin-bottom:18px}
.login-card input{
  width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.08);border-radius:12px;
  font-size:14px;background:rgba(255,255,255,.04);color:#fff;font-family:inherit;
  transition:border .2s;
}
.login-card input:focus{outline:none;border-color:var(--primary)}
.login-card input::placeholder{color:rgba(255,255,255,.2)}
.login-card .btn{width:100%;padding:12px;font-size:15px;margin-top:6px}
.login-card .divider{text-align:center;color:rgba(255,255,255,.2);font-size:12px;margin:18px 0}
.login-card .btn-key{width:100%;padding:12px;border:1px solid rgba(255,255,255,.08);border-radius:12px;
  background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:14px;
  font-family:inherit;transition:.2s;
}
.login-card .btn-key:hover{background:rgba(255,255,255,.05);color:#fff}
.login-card .error{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none}

/* ─── Empty ─── */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px}

/* ─── Order Detail ─── */
.order-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.order-detail-grid .field{background:var(--bg);border-radius:var(--radius-sm);padding:14px 16px}
.order-detail-grid .field .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.order-detail-grid .field .value{font-size:15px;font-weight:600;margin-top:4px;color:var(--text)}

/* ─── Scrollbar ─── */
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,47,142,.3);border-radius:2px}

/* ─── Responsive ─── */
@media(max-width:768px){:root{--sidebar-w:60px}.sidebar-header .logo,.sidebar-header .logo-sub,.sidebar-nav a span,.sidebar-footer a span,.api-status span{display:none}.sidebar-nav a{padding:12px;justify-content:center}.main{margin-right:60px}.content{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.order-detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo"><span>GlowRX</span></div>
    <div class="login-sub">لوحة تحكم المتجر</div>
    <div class="form-group">
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" dir="ltr" style="text-align:right">
    </div>
    <div class="form-group">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
    </div>
    <button class="btn btn-primary" onclick="adminLogin()">تسجيل الدخول</button>
    <div class="divider">— أو —</div>
    <div class="form-group">
      <input type="password" id="adminKeyInput" placeholder="Admin Key">
    </div>
    <button class="btn-key" onclick="adminKeyLogin()">تسجيل الدخول بالمفتاح</button>
    <div class="error" id="loginError">بيانات الدخول غير صحيحة</div>
  </div>
</div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">✦ GlowRX</div>
    <div class="logo-sub">لوحة التحكم</div>
  </div>
  <nav class="sidebar-nav">
    <a class="active" onclick="showSection('dashboard')"><span class="icon">📊</span><span>الإحصائيات</span></a>
    <a onclick="showSection('orders')"><span class="icon">📦</span><span>الطلبات</span></a>
    <a onclick="showSection('products')"><span class="icon">🛍️</span><span>المنتجات</span></a>
    <a onclick="showSection('users')"><span class="icon">👥</span><span>العملاء</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="#" onclick="viewStore()"><span class="icon">🌐</span><span>عرض المتجر</span></a>
    <a href="#" onclick="logout()"><span class="icon">🚪</span><span>تسجيل خروج</span></a>
    <div class="api-status"><span class="dot" id="apiDot"></span><span id="apiStatusText">متصل بالخادم</span></div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main" id="mainApp">
  <div class="topbar">
    <h1 id="pageTitle">📊 الإحصائيات</h1>
    <div class="topbar-actions">
      <button onclick="toggleDark()" id="themeBtn">🌙</button>
      <button onclick="toggleLang()" id="langToggle">English</button>
    </div>
  </div>

  <div class="content">
    <!-- Dashboard -->
    <div id="section-dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card">
        <div class="card-header"><h3>📋 آخر الطلبات</h3></div>
        <div id="recentOrders"></div>
      </div>
    </div>

    <!-- Orders -->
    <div id="section-orders" class="hidden">
      <div class="tabs" id="orderTabs">
        <button class="active" onclick="filterOrders('')">الكل</button>
        <button onclick="filterOrders('pending')">قيد الانتظار</button>
        <button onclick="filterOrders('confirmed')">مؤكد</button>
        <button onclick="filterOrders('shipped')">تم الشحن</button>
        <button onclick="filterOrders('delivered')">تم التوصيل</button>
        <button onclick="filterOrders('cancelled')">ملغي</button>
      </div>
      <div class="search-bar">
        <input type="text" id="orderSearch" placeholder="🔍 بحث عن طلب..." oninput="loadOrders()">
      </div>
      <div class="card"><div id="ordersTable"></div></div>
    </div>

    <!-- Products -->
    <div id="section-products" class="hidden">
      <div class="card">
        <div class="card-header">
          <h3>🛍️ المنتجات</h3>
          <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ إضافة</button>
        </div>
        <div class="search-bar">
          <input type="text" id="productSearch" placeholder="🔍 بحث..." oninput="loadProducts()">
        </div>
        <div id="productsTable"></div>
      </div>
    </div>

    <!-- Users -->
    <div id="section-users" class="hidden">
      <div class="card">
        <div class="card-header"><h3>👥 العملاء</h3></div>
        <div class="search-bar">
          <input type="text" id="userSearch" placeholder="🔍 بحث عن عميل..." oninput="loadUsers()">
        </div>
        <div id="usersTable"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h3 id="productModalTitle">إضافة منتج جديد</h3>
    <div class="form-row">
      <div class="form-group"><label>الاسم (عربي)</label><input id="pNameAr" placeholder="أحمر شفاه MAC مات"></div>
      <div class="form-group"><label>الاسم (English)</label><input id="pNameEn" placeholder="MAC Matte Lipstick"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>الوصف (عربي)</label><textarea id="pDescAr"></textarea></div>
      <div class="form-group"><label>الوصف (English)</label><textarea id="pDescEn"></textarea></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>السعر (جنيه)</label><input type="number" id="pPrice" step="0.01"></div>
      <div class="form-group"><label>المخزون</label><input type="number" id="pStock"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>القسم</label><select id="pCategory"></select></div>
      <div class="form-group"><label>مميز</label><select id="pFeatured"><option value="0">لا</option><option value="1">نعم</option></select></div>
    </div>
    <div class="form-group"><label>الصور (رابط لكل سطر)</label><textarea id="pImages" placeholder="https://images.unsplash.com/photo-..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveProduct()">💾 حفظ</button>
      <button class="btn btn-outline" onclick="closeProductModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h3>📦 تفاصيل الطلب</h3>
    <div id="orderDetailContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('orderModal')">إغلاق</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="userModal">
  <div class="modal">
    <h3>👤 تفاصيل العميل</h3>
    <div id="userDetailContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('userModal')">إغلاق</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'https://cosmetics-store-api.vercel.app/api';
const STORE_URL = 'https://adhamkhaled1510.github.io/glowrx-store/';
let token = localStorage.getItem('adminToken') || '';
let adminKey = localStorage.getItem('adminKey') || '';
let lang = localStorage.getItem('adminLang') || 'ar';
let dark = localStorage.getItem('adminDark') === 'true';
let editingProductId = null;
let orderFilter = '';
let orderPage = 1;

if (dark) document.documentElement.classList.add('dark');

function t(ar, en) { return lang === 'ar' ? ar : en; }

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(30px)'; t.style.transition = 'all .3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

function getHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  if (adminKey) h['x-admin-key'] = adminKey;
  return h;
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...getHeaders(), ...opts.headers } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}

function viewStore() { window.open(STORE_URL, '_blank'); }

function toggleDark() {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  localStorage.setItem('adminDark', dark);
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}

function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('adminLang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langToggle').textContent = lang === 'ar' ? 'English' : 'العربية';
  renderCurrentSection();
}

// ─── LOGIN ───
async function adminLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  try {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    if (data.user.role !== 'admin') throw new Error('ليس لديك صلاحية المشرف');
    token = data.token; localStorage.setItem('adminToken', token); enterApp();
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = e.message;
  }
}

async function adminKeyLogin() {
  const key = document.getElementById('adminKeyInput').value;
  if (!key) return;
  adminKey = key; localStorage.setItem('adminKey', key);
  try { await api('/admin/stats'); enterApp(); }
  catch(e) { adminKey = ''; localStorage.removeItem('adminKey'); document.getElementById('loginError').style.display = 'block'; document.getElementById('loginError').textContent = 'مفتاح غير صحيح'; }
}

function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('sidebar').style.display = '';
  document.getElementById('mainApp').style.display = '';
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  showSection('dashboard'); checkAPI();
}

function logout() {
  token = ''; adminKey = ''; localStorage.removeItem('adminToken'); localStorage.removeItem('adminKey');
  document.getElementById('loginPage').style.display = ''; document.getElementById('sidebar').style.display = 'none'; document.getElementById('mainApp').style.display = 'none';
}

// Auto-login
if (token || adminKey) { api('/admin/stats').then(enterApp).catch(() => { token = ''; adminKey = ''; localStorage.removeItem('adminToken'); localStorage.removeItem('adminKey'); }); }

// ─── NAV ───
let currentSection = 'dashboard';
function showSection(s) {
  currentSection = s;
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.content > div[id^="section-"]').forEach(d => d.classList.add('hidden'));
  document.getElementById('section-' + s).classList.remove('hidden');
  const activeLink = event?.target?.closest('a');
  if (activeLink) activeLink.classList.add('active');
  else document.querySelector(`.sidebar-nav a[onclick*="${s}"]`)?.classList.add('active');
  const titles = { dashboard: '📊 ' + t('الإحصائيات','Dashboard'), orders: '📦 ' + t('الطلبات','Orders'), products: '🛍️ ' + t('المنتجات','Products'), users: '👥 ' + t('العملاء','Customers') };
  document.getElementById('pageTitle').textContent = titles[s] || s;
  renderCurrentSection();
}
function renderCurrentSection() {
  if (currentSection === 'dashboard') loadDashboard();
  else if (currentSection === 'orders') loadOrders();
  else if (currentSection === 'products') loadProducts();
  else if (currentSection === 'users') loadUsers();
}

async function checkAPI() {
  try {
    await fetch(API + '/health');
    document.getElementById('apiDot').className = 'dot';
    document.getElementById('apiStatusText').textContent = t('متصل بالخادم','Connected');
  } catch {
    document.getElementById('apiDot').className = 'dot offline';
    document.getElementById('apiStatusText').textContent = t('غير متصل','Offline');
  }
}

// ─── DASHBOARD ───
async function loadDashboard() {
  try {
    const data = await api('/admin/stats');
    const s = data.stats;
    const items = (lang === 'ar' ? [
      { icon: '📦', num: s.totalOrders, label: 'إجمالي الطلبات' },
      { icon: '💰', num: Math.round(s.totalRevenue).toLocaleString() + ' جنيه', label: 'إجمالي الإيرادات' },
      { icon: '👥', num: s.totalUsers, label: 'إجمالي العملاء' },
      { icon: '🛍️', num: s.totalProducts, label: 'إجمالي المنتجات' },
      { icon: '⏳', num: s.pendingOrders, label: 'طلبات معلقة' },
    ] : [
      { icon: '📦', num: s.totalOrders, label: 'Total Orders' },
      { icon: '💰', num: Math.round(s.totalRevenue).toLocaleString() + ' EGP', label: 'Total Revenue' },
      { icon: '👥', num: s.totalUsers, label: 'Total Customers' },
      { icon: '🛍️', num: s.totalProducts, label: 'Total Products' },
      { icon: '⏳', num: s.pendingOrders, label: 'Pending Orders' },
    ]);
    document.getElementById('statsGrid').innerHTML = items.map(i =>
      `<div class="stat-card"><div class="stat-icon">${i.icon}</div><div class="stat-num">${i.num}</div><div class="stat-label">${i.label}</div><div class="stat-bar"></div></div>`
    ).join('');
    const ro = data.recentOrders;
    if (!ro.length) { document.getElementById('recentOrders').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>' + t('لا توجد طلبات بعد','No orders yet') + '</p></div>'; return; }
    document.getElementById('recentOrders').innerHTML = `<div class="table-wrap"><table>
      <tr><th>#</th><th>${t('العميل','Customer')}</th><th>${t('المجموع','Total')}</th><th>${t('الحالة','Status')}</th><th>${t('التاريخ','Date')}</th></tr>
      ${ro.map(o => `<tr class="clickable" onclick="showOrderDetail(${o.id})"><td>#${o.id}</td><td>${o.user_name || '—'}</td><td>${Math.round(o.total)} EGP</td><td><span class="badge ${o.status}">${t(o.status,o.status)}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('')}
    </table></div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

// ─── ORDERS ───
function filterOrders(status) {
  orderFilter = status; orderPage = 1;
  document.querySelectorAll('#orderTabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active'); loadOrders();
}

async function loadOrders() {
  try {
    const search = document.getElementById('orderSearch').value;
    const q = new URLSearchParams({ status: orderFilter, page: orderPage, limit: 20 });
    if (search) q.set('search', search);
    const data = await api('/admin/orders?' + q.toString());
    if (!data.orders.length) { document.getElementById('ordersTable').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>' + t('لا توجد طلبات','No orders found') + '</p></div>'; return; }
    const h = [t('العميل','Customer'), t('المجموع','Total'), t('طريقة الدفع','Payment'), t('الحالة','Status'), t('التاريخ','Date')];
    document.getElementById('ordersTable').innerHTML = `<div class="table-wrap"><table>
      <tr><th>#</th>${h.map(hh => `<th>${hh}</th>`).join('')}<th></th></tr>
      ${data.orders.map(o => `<tr>
        <td class="clickable" onclick="showOrderDetail(${o.id})">#${o.id}</td>
        <td>${o.user_name || t('زائر','Guest')}<br><small style="color:var(--text2)">${o.phone || ''}</small></td>
        <td>${Math.round(o.total)} EGP</td><td>${o.payment_method}</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
        <td>${new Date(o.created_at).toLocaleDateString()}</td>
        <td><select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)">
          ${['pending','confirmed','shipped','delivered','cancelled'].map(s => `<option ${s===o.status?'selected':''} value="${s}">${s}</option>`).join('')}
        </select></td>
      </tr>`).join('')}
    </table></div>`;
    const tp = Math.ceil(data.total / data.limit);
    document.getElementById('ordersTable').innerHTML += `<div class="pagination">
      <button ${orderPage<=1?'disabled':''} onclick="orderPage--;loadOrders()">${t('السابق','Prev')}</button>
      <span>${orderPage} / ${tp}</span>
      <button ${orderPage>=tp?'disabled':''} onclick="orderPage++;loadOrders()">${t('التالي','Next')}</button>
    </div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

async function showOrderDetail(id) {
  try {
    const o = await api('/admin/orders/' + id);
    const items = o.items.map(i => `• ${i.name_ar || i.name} × ${i.quantity} — ${Math.round(i.price * i.quantity)} EGP`).join('<br>');
    document.getElementById('orderDetailContent').innerHTML = `
      <div class="order-detail-grid">
        <div class="field"><div class="label">${t('رقم الطلب','Order #')}</div><div class="value">#${o.id}</div></div>
        <div class="field"><div class="label">${t('الحالة','Status')}</div><div class="value"><span class="badge ${o.status}">${o.status}</span></div></div>
        <div class="field"><div class="label">${t('العميل','Customer')}</div><div class="value">${o.user_name || t('زائر','Guest')}</div></div>
        <div class="field"><div class="label">${t('الإيميل','Email')}</div><div class="value">${o.user_email || '—'}</div></div>
        <div class="field"><div class="label">${t('الهاتف','Phone')}</div><div class="value">${o.user_phone || o.phone || '—'}</div></div>
        <div class="field"><div class="label">${t('طريقة الدفع','Payment')}</div><div class="value">${o.payment_method}</div></div>
        <div class="field"><div class="label">${t('المجموع','Total')}</div><div class="value">${Math.round(o.total)} EGP</div></div>
        <div class="field"><div class="label">${t('حالة الدفع','Payment Status')}</div><div class="value">${o.payment_status}</div></div>
        <div class="field" style="grid-column:1/-1"><div class="label">${t('العنوان','Address')}</div><div class="value">${o.shipping_address || '—'}</div></div>
        <div class="field" style="grid-column:1/-1"><div class="label">${t('ملاحظات','Notes')}</div><div class="value">${o.notes || '—'}</div></div>
        <div class="field" style="grid-column:1/-1"><div class="label">${t('المنتجات','Items')}</div><div class="value">${items}</div></div>
      </div>
      <label style="font-weight:600;font-size:13px;color:var(--text2)">${t('تحديث الحالة','Status')}:</label>
      <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)" style="margin-right:8px">
        ${['pending','confirmed','shipped','delivered','cancelled'].map(s => `<option ${s===o.status?'selected':''} value="${s}">${s}</option>`).join('')}
      </select>`;
    document.getElementById('orderModal').classList.add('show');
  } catch(e) { showToast(e.message, 'error'); }
}

async function updateOrderStatus(id, status) {
  try { await api('/admin/orders/' + id + '/status', { method: 'PUT', body: JSON.stringify({ status }) }); showToast(t('تم تحديث الطلب','Order updated')); loadOrders(); }
  catch(e) { showToast(e.message, 'error'); }
}

// ─── PRODUCTS ───
async function loadProducts() {
  try {
    const data = await api('/admin/products');
    const search = document.getElementById('productSearch').value.toLowerCase();
    let products = data.products;
    if (search) products = products.filter(p => p.name_ar.includes(search) || p.name_en.toLowerCase().includes(search));
    if (!products.length) { document.getElementById('productsTable').innerHTML = '<div class="empty-state"><div class="empty-icon">🛍️</div><p>' + t('لا توجد منتجات','No products') + '</p></div>'; return; }
    document.getElementById('productsTable').innerHTML = `<div class="table-wrap"><table>
      <tr><th>#</th><th>${t('الاسم','Name')}</th><th>${t('السعر','Price')}</th><th>${t('المخزون','Stock')}</th><th>${t('القسم','Category')}</th><th>${t('مميز','Featured')}</th><th></th></tr>
      ${products.map(p => `<tr>
        <td>${p.id}</td><td>${lang === 'ar' ? p.name_ar : p.name_en}</td>
        <td style="font-weight:600;color:var(--primary)">${Math.round(p.price)} EGP</td><td>${p.stock}</td>
        <td>${lang === 'ar' ? (p.category_ar||'—') : (p.category_en||'—')}</td>
        <td>${p.featured ? '⭐' : '—'}</td>
        <td><button class="btn btn-sm btn-outline" onclick="openProductModal(${p.id})">✏️</button> <button class="btn btn-sm" style="background:var(--danger);color:#fff;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:12px" onclick="deleteProduct(${p.id})">🗑️</button></td>
      </tr>`).join('')}
    </table></div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

async function openProductModal(id = null) {
  editingProductId = id;
  document.getElementById('productModalTitle').textContent = id ? t('تعديل المنتج','Edit Product') : t('إضافة منتج جديد','Add New Product');
  ['pNameAr','pNameEn','pDescAr','pDescEn','pPrice','pStock','pImages'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('pFeatured').value = '0';
  const catRes = await fetch(API + '/products'); const catData = await catRes.json();
  document.getElementById('pCategory').innerHTML = (catData.categories||[]).map(c => `<option value="${c.id}">${c.name_ar} / ${c.name_en}</option>`).join('');
  if (id) {
    try { const data = await api('/admin/products'); const p = data.products.find(x => x.id === id);
      if (p) { const fm = {pNameAr:'name_ar',pNameEn:'name_en',pDescAr:'description_ar',pDescEn:'description_en'}; Object.entries(fm).forEach(([id,key]) => document.getElementById(id).value = p[key]||'');
        document.getElementById('pPrice').value = p.price; document.getElementById('pStock').value = p.stock; document.getElementById('pCategory').value = p.category_id; document.getElementById('pFeatured').value = p.featured;
        document.getElementById('pImages').value = JSON.parse(p.images||'[]').join('\n'); }
    } catch(e) { showToast(e.message, 'error'); }
  }
  document.getElementById('productModal').classList.add('show');
}
function closeProductModal() { document.getElementById('productModal').classList.remove('show'); editingProductId = null; }

async function saveProduct() {
  const body = { name_ar: document.getElementById('pNameAr').value, name_en: document.getElementById('pNameEn').value,
    description_ar: document.getElementById('pDescAr').value, description_en: document.getElementById('pDescEn').value,
    price: parseFloat(document.getElementById('pPrice').value), stock: parseInt(document.getElementById('pStock').value)||0,
    category_id: parseInt(document.getElementById('pCategory').value), featured: parseInt(document.getElementById('pFeatured').value),
    images: document.getElementById('pImages').value.split('\n').filter(s=>s.trim()) };
  if (!body.name_ar || !body.name_en) return showToast(t('الاسم مطلوب','Name required'), 'error');
  try {
    if (editingProductId) { await api('/admin/products/' + editingProductId, { method: 'PUT', body: JSON.stringify(body) }); showToast(t('تم التعديل','Updated')); }
    else { await api('/admin/products', { method: 'POST', body: JSON.stringify(body) }); showToast(t('تمت الإضافة','Added')); }
    closeProductModal(); loadProducts();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteProduct(id) {
  if (!confirm(t('متأكد من الحذف؟','Delete?'))) return;
  try { await api('/admin/products/' + id, { method: 'DELETE' }); showToast(t('تم الحذف','Deleted')); loadProducts(); }
  catch(e) { showToast(e.message, 'error'); }
}

// ─── USERS ───
async function loadUsers() {
  try {
    const data = await api('/admin/users');
    const search = document.getElementById('userSearch').value.toLowerCase();
    let users = data.users;
    if (search) users = users.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.phone||'').includes(search));
    if (!users.length) { document.getElementById('usersTable').innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><p>' + t('لا يوجد عملاء','No customers') + '</p></div>'; return; }
    const h = [t('الاسم','Name'), t('الإيميل','Email'), t('الهاتف','Phone'), t('الطلبات','Orders'), t('الدور','Role'), t('التسجيل','Joined')];
    document.getElementById('usersTable').innerHTML = `<div class="table-wrap"><table>
      <tr><th>#</th>${h.map(hh => `<th>${hh}</th>`).join('')}</tr>
      ${users.map(u => `<tr class="clickable" onclick="showUserDetail(${u.id})">
        <td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.phone || '—'}</td>
        <td><span style="font-weight:600">${u.order_count||0}</span></td>
        <td>${u.role === 'admin' ? '👑 Admin' : t('عميل','Customer')}</td>
        <td>${new Date(u.created_at).toLocaleDateString()}</td>
      </tr>`).join('')}
    </table></div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

async function showUserDetail(id) {
  try {
    const data = await api('/admin/users/' + id);
    const u = data.user;
    const ordersHtml = !data.orders.length ? '<div style="color:var(--text2);padding:14px">' + t('لا توجد طلبات','No orders') + '</div>' :
      `<table><tr><th>#</th><th>${t('المجموع','Total')}</th><th>${t('الحالة','Status')}</th><th>${t('التاريخ','Date')}</th></tr>
      ${data.orders.map(o => `<tr><td>#${o.id}</td><td>${Math.round(o.total)} EGP</td><td><span class="badge ${o.status}">${o.status}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('')}</table>`;
    document.getElementById('userDetailContent').innerHTML = `
      <div class="order-detail-grid">
        <div class="field"><div class="label">${t('الاسم','Name')}</div><div class="value">${u.name}</div></div>
        <div class="field"><div class="label">${t('الإيميل','Email')}</div><div class="value">${u.email}</div></div>
        <div class="field"><div class="label">${t('الهاتف','Phone')}</div><div class="value">${u.phone||'—'}</div></div>
        <div class="field"><div class="label">${t('العنوان','Address')}</div><div class="value">${u.address||'—'}</div></div>
      </div>
      <h4 style="margin:18px 0 10px;color:var(--primary);font-size:14px">📦 ${t('الطلبات','Orders')}</h4>
      ${ordersHtml}`;
    document.getElementById('userModal').classList.add('show');
  } catch(e) { showToast(e.message, 'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// Init
if (lang === 'en') { document.documentElement.dir = 'ltr'; document.getElementById('langToggle').textContent = 'العربية'; }
</script>
